<!DOCTYPE html>
<html>
<head>
  <title>SVG to PNG Converter</title>
</head>
<body>
  <h1>Converting SVG to PNG...</h1>
  <div id="status">Starting...</div>

  <script>
    const statusDiv = document.getElementById('status');
    const img = new Image();
    img.src = '/favicon.svg';

    img.onload = async function() {
      try {
        statusDiv.innerText = 'Image loaded. Rendering...';
        
        // 1. Generate 192x192
        const p192 = await generatePNG(img, 192, 192, 48 / 46);
        statusDiv.innerText = 'Generated 192x192. Saving...';
        await saveIcon('icon-192x192.png', p192);

        // 2. Generate 512x512
        const p512 = await generatePNG(img, 512, 512, 48 / 46);
        statusDiv.innerText = 'Generated 512x512. Saving...';
        await saveIcon('icon-512x512.png', p512);

        statusDiv.innerText = 'All icons saved. Shutting down...';
        await fetch('/shutdown', { method: 'POST' });
        statusDiv.innerText = 'Done!';
      } catch (err) {
        statusDiv.innerText = 'Error: ' + err.message;
        console.error(err);
      }
    };

    img.onerror = function() {
      statusDiv.innerText = 'Failed to load SVG.';
    };

    function generatePNG(image, width, height, aspectRatio) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        // Draw solid dark coffee background
        ctx.fillStyle = '#120a08';
        ctx.fillRect(0, 0, width, height);

        // Scale image to take 60% of the canvas height/width
        const targetHeight = height * 0.6;
        const targetWidth = targetHeight * aspectRatio;

        const x = (width - targetWidth) / 2;
        const y = (height - targetHeight) / 2;

        ctx.drawImage(image, x, y, targetWidth, targetHeight);
        resolve(canvas.toDataURL('image/png'));
      });
    }

    async function saveIcon(filename, base64Data) {
      const response = await fetch('/save', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ filename, base64Data })
      });
      if (!response.ok) {
        throw new Error(`Failed to save ${filename}`);
      }
      return response.json();
    }
  </script>
</body>
</html>
